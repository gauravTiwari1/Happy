<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#080814;color:#fff;min-height:100vh}
#root{min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#080814}::-webkit-scrollbar-thumb{background:#7c3aed;border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes ping{0%{transform:scale(1);opacity:.8}75%,100%{transform:scale(2);opacity:0}}
.fu{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
.float{animation:float 3.5s ease-in-out infinite}
.inp{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:11px;padding:11px 15px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:#fff;outline:none;transition:all .2s}
.inp::placeholder{color:rgba(255,255,255,.22)}
.inp:focus{border-color:#a78bfa;background:rgba(167,139,250,.07);box-shadow:0 0 0 3px rgba(167,139,250,.09)}
.inp option{background:#111128;color:#fff}
.btn-v{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:none;border-radius:11px;padding:11px 22px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .22s}
.btn-v:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,58,237,.5)}
.btn-v:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none}
.btn-g{background:linear-gradient(135deg,#059669,#0891b2);color:#fff;border:none;border-radius:11px;padding:11px 22px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .22s}
.btn-g:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(5,150,105,.5)}
.btn-g:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none}
.btn-ghost{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:1.5px solid rgba(255,255,255,.12);border-radius:10px;padding:9px 18px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s}
.btn-ghost:hover{background:rgba(255,255,255,.11);color:#fff}
.btn-red{background:rgba(220,38,38,.14);color:#f87171;border:1px solid rgba(220,38,38,.25);border-radius:8px;padding:6px 13px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .2s}
.btn-red:hover{background:rgba(220,38,38,.26)}
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.tag-v{background:rgba(124,58,237,.18);color:#c4b5fd;border:1px solid rgba(124,58,237,.25)}
.tag-g{background:rgba(5,150,105,.18);color:#6ee7b7;border:1px solid rgba(5,150,105,.25)}
.tag-r{background:rgba(220,38,38,.18);color:#fca5a5;border:1px solid rgba(220,38,38,.25)}
.tag-b{background:rgba(8,145,178,.18);color:#67e8f9;border:1px solid rgba(8,145,178,.25)}
.tag-y{background:rgba(217,119,6,.18);color:#fcd34d;border:1px solid rgba(217,119,6,.25)}
.nav{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;cursor:pointer;font-weight:500;font-size:13px;color:rgba(255,255,255,.42);transition:all .18s;margin-bottom:2px}
.nav:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.78)}
.nav.onV{background:rgba(124,58,237,.2);color:#c4b5fd;border:1px solid rgba(124,58,237,.22)}
.nav.onG{background:rgba(5,150,105,.18);color:#6ee7b7;border:1px solid rgba(5,150,105,.2)}
.lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.28);letter-spacing:1.2px;display:block;margin-bottom:6px;text-transform:uppercase}
.card{background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.07);border-radius:14px;padding:16px;position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,#7c3aed,#06b6d4,#10b981)}
.dr-card{background:rgba(255,255,255,.03);border:1.5px solid rgba(255,255,255,.07);border-radius:14px;padding:16px;transition:all .24s;cursor:pointer;position:relative;overflow:hidden}
.dr-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#7c3aed,#06b6d4)}
.dr-card:hover{border-color:rgba(124,58,237,.38);background:rgba(124,58,237,.06);transform:translateY(-3px);box-shadow:0 12px 32px rgba(124,58,237,.16)}
.dr-card.off{opacity:.42;cursor:not-allowed}
.dr-card.off:hover{transform:none;border-color:rgba(255,255,255,.07);background:rgba(255,255,255,.03);box-shadow:none}
.row{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:11px;margin-bottom:8px;flex-wrap:wrap;gap:9px}
.stat{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:15px;text-align:center}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:18px;animation:fadeIn .2s ease}
.modal{background:#0d0d22;border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:26px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;animation:fadeUp .3s cubic-bezier(.22,1,.36,1)}
.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;opacity:.22}
.slot-chip{border:1.5px solid rgba(124,58,237,.25);background:rgba(124,58,237,.07);color:#c4b5fd;border-radius:7px;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;font-family:'Plus Jakarta Sans',sans-serif}
.slot-chip:hover:not(:disabled){border-color:rgba(124,58,237,.5);background:rgba(124,58,237,.14)}
.slot-chip.booked{background:rgba(220,38,38,.07);border-color:rgba(220,38,38,.2);color:rgba(248,113,113,.65);cursor:default}
.slot-chip.wl-join{background:rgba(217,119,6,.07);border-color:rgba(217,119,6,.22);color:#fcd34d;cursor:pointer}
.slot-chip.wl-join:hover{background:rgba(217,119,6,.16)}
.slot-chip.sel{background:linear-gradient(135deg,#7c3aed,#4f46e5);border-color:#a78bfa;color:#fff;box-shadow:0 4px 14px rgba(124,58,237,.4)}
.slot-chip.mywl{background:rgba(217,119,6,.15);border-color:#fbbf24;color:#fef3c7;cursor:default}
.time-btn{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1);color:rgba(255,255,255,.52);border-radius:7px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'Plus Jakarta Sans',sans-serif}
.time-btn:hover{border-color:rgba(5,150,105,.4);color:#6ee7b7;background:rgba(5,150,105,.07)}
.time-btn.picked{background:rgba(5,150,105,.2);border-color:#6ee7b7;color:#fff}
.toggle{position:relative;width:46px;height:24px;display:inline-block}
.toggle input{opacity:0;width:0;height:0}
.tsl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.12);border-radius:24px;transition:.28s}
.tsl:before{position:absolute;content:"";height:16px;width:16px;left:4px;bottom:4px;background:#fff;border-radius:50%;transition:.28s}
input:checked+.tsl{background:linear-gradient(135deg,#10b981,#0891b2)}
input:checked+.tsl:before{transform:translateX(22px)}
.chat-user{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border-radius:15px 15px 3px 15px;padding:10px 13px;max-width:80%;align-self:flex-end;font-size:13.5px;line-height:1.62;white-space:pre-wrap;word-break:break-word}
.chat-ai{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.09);color:rgba(255,255,255,.88);border-radius:15px 15px 15px 3px;padding:10px 13px;max-width:85%;align-self:flex-start;font-size:13.5px;line-height:1.68;white-space:pre-wrap;word-break:break-word}
.notif{position:fixed;bottom:22px;right:22px;z-index:2000;width:340px;background:linear-gradient(135deg,#0f172a,#1e1b4b);border:1.5px solid rgba(124,58,237,.45);border-radius:16px;padding:20px;box-shadow:0 18px 50px rgba(124,58,237,.38);animation:slideIn .45s cubic-bezier(.22,1,.36,1)}
</style>
</head>
<body>

<script type="text/babel">
const{useState,useEffect,useRef}=React;

  {id:"NMC20009",name:"Dr. Navjot Dhillon",spec:"Neurologist",age:50,city:"Phagwara",state:"Punjab",fees:700,quote:"The brain is the most complex organ — I decode it daily.",slots:["10:00 AM","10:30 AM","11:00 AM","02:30 PM","03:00 PM","03:30 PM","04:00 PM"],bk:[],apts:[],waitlist:{},on:false},

];
const LS={
  get:(k,fb=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  del:(k)=>{try{localStorage.removeItem(k);}catch{}}
};
/* Always merge dummy docs — new doctors always visible, existing bookings preserved */
(()=>{
  const saved=LS.get("cl_docs")||[];
  const merged=DUMMY_DOCS.map(dd=>{
    const existing=saved.find(s=>s.id===dd.id);
    return existing?existing:dd; // keep existing data, add new ones fresh
  });
  // also keep any real doctor accounts (NMC IDs not in DUMMY_DOCS)
  const realDrs=saved.filter(s=>!DUMMY_DOCS.find(dd=>dd.id===s.id));
  LS.set("cl_docs",[...merged,...realDrs]);
})();
const sortTimes=arr=>[...arr].sort((a,b)=>{const f=x=>{const[h,m]=x.split(":").map(Number);return(x.includes("PM")&&h!==12?h+12:x.includes("AM")&&h===12?0:h)*60+m;};return f(a)-f(b);});
const Av=({name,sz=40,g=["#7c3aed","#4f46e5"]})=>{const ini=(name||"?").split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();return <div style={{width:sz,height:sz,borderRadius:"50%",background:`linear-gradient(135deg,${g[0]},${g[1]})`,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:sz*.36,flexShrink:0,fontFamily:"inherit",boxShadow:`0 3px 10px ${g[0]}44`}}>{ini}</div>;};
const Spin=()=><span style={{display:"inline-block",width:15,height:15,border:"2px solid rgba(255,255,255,.25)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .65s linear infinite",verticalAlign:"middle"}}/>;

function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3800);return()=>clearTimeout(t);},[]);
  const bg=type==="ok"?"linear-gradient(135deg,#059669,#0891b2)":type==="new"?"linear-gradient(135deg,#7c3aed,#4f46e5)":"linear-gradient(135deg,#d97706,#92400e)";

}

/* LANDING */
function Landing({onChoice}){
  return(
    <div style={{minHeight:"100vh",background:"#080814",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>

      <div className="fu" style={{textAlign:"center",marginBottom:48}}>

          <div style={{width:52,height:52,borderRadius:15,background:"linear-gradient(135deg,#7c3aed,#06b6d4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,boxShadow:"0 8px 30px rgba(124,58,237,.55)"}}>+</div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:48,fontWeight:900,background:"linear-gradient(135deg,#c4b5fd,#67e8f9,#6ee7b7)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>CureLink</h1>
        </div>
        <p style={{color:"rgba(255,255,255,.4)",fontSize:15}}>Smart Healthcare. Seamless Connections.</p>
        <p style={{color:"rgba(255,255,255,.2)",fontSize:12,marginTop:6}}>Patient & Doctor can use this simultaneously from the same file</p>
      </div>

/* PATIENT LOGIN */
function PatientLogin({onBack,onLogin}){
  const[f,setF]=useState({name:"",email:"",phone:""});const[err,setErr]=useState("");
  const go=()=>{
    setErr("");
    if(!f.name.trim()||!f.email.trim()||!f.phone.trim())return setErr("All fields are required.");
    if(!/\S+@\S+\.\S+/.test(f.email))return setErr("Enter a valid email.");
    if(!/^\d{10}$/.test(f.phone))return setErr("Enter a valid 10-digit phone number.");
    onLogin(f);
  };
  return(
    <div style={{minHeight:"100vh",background:"#080814",display:"flex",position:"relative",overflow:"hidden"}}>
      <div className="orb" style={{width:600,height:600,background:"#7c3aed",top:-200,left:-200}}/>

        <div className="fu" style={{textAlign:"center"}}>
          <div style={{fontSize:68,marginBottom:16}} className="float">🧑‍⚕️</div>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:32,color:"#fff",marginBottom:10}}>Patient Portal</h2>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginTop:26}}>
            {[["🤖","AI Checker"],["📅","Easy Booking"],["⏳","Waiting List"],["🔒","Account Saved"]].map(([ic,lb])=>(
              <div key={lb} style={{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.08)",borderRadius:10,padding:"11px",textAlign:"center"}}>
                <div style={{fontSize:20,marginBottom:4}}>{ic}</div><div style={{color:"rgba(255,255,255,.5)",fontSize:11,fontWeight:700}}>{lb}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:30,position:"relative",zIndex:1}}>
        <div className="fu" style={{width:"100%",maxWidth:400,animationDelay:".06s"}}>

function AiCheck(){

          <div style={{color:"rgba(255,255,255,.4)",fontSize:11.5}}>Powered by Claude AI • Ask anything about your health</div>
        </div>

          <span style={{fontSize:11,color:apiSet?"#6ee7b7":"#f87171",fontWeight:700}}>{apiSet?"LIVE":"KEY MISSING"}</span>
        </div>
      </div>

                if(pos>=0)return <div key={s} className="slot-chip mywl" title={"You're #"+(pos+1)+" on waitlist"}>⏳ {s} <span style={{fontSize:10,opacity:.65}}>#{pos+1}</span></div>;
                return <button key={s} className="slot-chip wl-join" onClick={()=>joinWL(s)}>🔴 {s}{wlCount>0&&<span style={{fontSize:10,marginLeft:4,opacity:.7}}>({wlCount})</span>}</button>;
              })}
            </div>
            <div style={{fontSize:10.5,color:"rgba(255,255,255,.22)",marginTop:7,display:"flex",gap:10,flexWrap:"wrap"}}><span>🟢 Free</span><span>🔴 Booked (join waitlist)</span><span>🔒 Aapki aaj is slot pe appointment</span><span>⏳ Waitlist</span></div>
          </div>
          {wlDone&&<div style={{background:"rgba(217,119,6,.09)",border:"1px solid rgba(217,119,6,.22)",borderRadius:10,padding:"10px 13px",marginBottom:13,color:"#fcd34d",fontSize:12.5}}>✅ Joined waitlist for <strong>{wlDone}</strong>! Popup notification when slot opens.</div>}
          {bookErr&&<div style={{background:"rgba(220,38,38,.1)",border:"1px solid rgba(220,38,38,.22)",borderRadius:10,padding:"10px 13px",marginBottom:13,color:"#f87171",fontSize:12.5}}>⚠️ {bookErr}</div>}
          <div style={{marginBottom:15}}><label className="lbl">NOTES FOR DOCTOR (Optional)</label><textarea className="inp" rows={3} placeholder="Briefly describe your symptoms..." value={notes} onChange={e=>setNotes(e.target.value)} style={{resize:"none"}}/></div>
          <button className="btn-v" onClick={go} disabled={!sel||alreadyThisDr} style={{width:"100%",padding:"12px",fontSize:14,opacity:alreadyThisDr?.5:1}}>Confirm {sel?"@ "+sel:""}</button>
        </>}
      </div>
    </div>
  );
}

/* PATIENT DASHBOARD */
function PatientDash({user,setUser,docs,setDocs,onLogout}){
  const[tab,setTab]=useState("home");const[srch,setSrch]=useState("");const[fspec,setFspec]=useState("All");
  const[bookDoc,setBookDoc]=useState(null);const[profOpen,setProfOpen]=useState(false);
  const[pe,setPe]=useState({age:user.age||"",city:user.city||"",state:user.state||"",address:user.address||""});
  const[slotPopup,setSlotPopup]=useState(null);const[toast,setToast]=useState(null);

  useEffect(()=>{
    const sync=()=>setDocs(LS.get("cl_docs",[]));
    window.addEventListener("focus",sync);
    document.addEventListener("visibilitychange",()=>document.visibilityState==="visible"&&sync());
    return()=>window.removeEventListener("focus",sync);
  },[]);
  useEffect(()=>{
    const check=()=>{
      const freed=LS.get("cl_freed_slots",[]);const fresh=LS.get("cl_docs",[]);
      const recent=freed.filter(f=>Date.now()-f.ts<10000);
      for(const ev of recent){
        const d=fresh.find(x=>x.id===ev.drId);if(!d)continue;
        const wl=(d.waitlist||{})[ev.slot]||[];
        if(wl[0]?.email===user.email){
          setSlotPopup({drId:ev.drId,drName:d.name,slot:ev.slot,fees:d.fees,city:d.city,state:d.state});
          LS.set("cl_freed_slots",freed.filter(f=>f.ts!==ev.ts));
          setDocs(fresh);break;
        }
      }
    };
    check();
    const iv=setInterval(check,2000);
    const h=e=>{if(e.key==="cl_freed_slots"||e.key==="cl_docs"){setDocs(LS.get("cl_docs",[]));check();}};
    window.addEventListener("storage",h);
    return()=>{clearInterval(iv);window.removeEventListener("storage",h);};
  },[user.email]);

  const myWL=docs.flatMap(doc=>Object.entries(doc.waitlist||{}).flatMap(([slot,wl])=>{
    const pos=wl.findIndex(w=>w.email===user.email);if(pos===-1)return[];
    return[{drId:doc.id,drName:doc.name,spec:doc.spec,fees:doc.fees,slot,position:pos+1,ahead:pos,total:wl.length,city:doc.city}];
  }));

  const book=(doctor,slot,notes)=>{
    const a={id:Date.now(),drId:doctor.id,drName:doctor.name,spec:doctor.spec,slot,date:new Date().toLocaleDateString("en-IN"),fees:doctor.fees,notes,status:"Confirmed"};
    setUser(u=>({...u,apts:[...u.apts,a]}));
    setDocs(ds=>ds.map(d=>{if(d.id!==doctor.id)return d;const wl={...(d.waitlist||{})};if(wl[slot])wl[slot]=wl[slot].filter(w=>w.email!==user.email);return{...d,bk:[...d.bk,slot],waitlist:wl,apts:[...d.apts,{...a,pName:user.name,pPhone:user.phone}]};}));
  };
  const joinWL=(drId,slot)=>{
    setDocs(ds=>ds.map(d=>{if(d.id!==drId)return d;const wl={...(d.waitlist||{})};const sw=wl[slot]||[];if(sw.some(w=>w.email===user.email))return d;wl[slot]=[...sw,{id:Date.now(),pName:user.name,pPhone:user.phone,email:user.email,joinedAt:new Date().toISOString()}];return{...d,waitlist:wl};}));
    setToast({msg:"Added to waiting list! Stay on this page for instant notifications.",type:"notify"});
  };
  const cancelApt=id=>{
    const a=user.apts.find(x=>x.id===id);if(!a)return;
    setUser(u=>({...u,apts:u.apts.map(x=>x.id===id?{...x,status:"Cancelled"}:x)}));
    setDocs(ds=>ds.map(d=>{if(d.name!==a.drName)return d;const freed=LS.get("cl_freed_slots",[]);freed.push({drId:d.id,drName:d.name,slot:a.slot,cancelledBy:user.name,ts:Date.now()});LS.set("cl_freed_slots",freed);return{...d,bk:d.bk.filter(s=>s!==a.slot),apts:d.apts.map(x=>x.id===id?{...x,status:"Cancelled by Patient"}:x)};}));
    setToast({msg:"Appointment cancelled. Waiting list patients notified!",type:"notify"});
  };

  const allSpecs=["All",...Array.from(new Set(docs.map(d=>d.spec)))];
  const filtered=docs.filter(d=>{
    const ms=fspec==="All"||d.spec===fspec;
    const mq=d.name.toLowerCase().includes(srch.toLowerCase())||d.spec.toLowerCase().includes(srch.toLowerCase())||(d.city||"").toLowerCase().includes(srch.toLowerCase());
    return ms&&mq;

/* ROOT APP */
function App(){
  const[docs,setDocsRaw]=useState(()=>LS.get("cl_docs",[]));
  const setDocs=upd=>{setDocsRaw(prev=>{const next=typeof upd==="function"?upd(prev):upd;LS.set("cl_docs",next);return next;});};
  const[screen,setScreen]=useState("landing");
  const[curUser,setCurUserRaw]=useState(null);
  const setUser=upd=>{setCurUserRaw(prev=>{const next=typeof upd==="function"?upd(prev):upd;if(next){LS.set("cl_cur_user",next);const all=LS.get("cl_all_users",{});all[next.email.toLowerCase()]=next;LS.set("cl_all_users",all);}return next;});};
  const[curDrId,setCurDrId]=useState(null);const[tempDr,setTempDr]=useState(null);
  const curDoc=docs.find(d=>d.id===curDrId)||null;
  const[toast,setToast]=useState(null);

  const handleUserLogin=f=>{
    const all=LS.get("cl_all_users",{});const key=f.email.toLowerCase();
    if(all[key]&&all[key].phone===f.phone){
      const saved=all[key];setCurUserRaw(saved);LS.set("cl_cur_user",saved);
      setToast({msg:"Welcome back, "+saved.name.split(" ")[0]+"! Your account restored.",type:"ok"});
    }else{
      const nu={...f,age:"",city:"",state:"",address:"",apts:[]};
      all[key]=nu;LS.set("cl_all_users",all);LS.set("cl_cur_user",nu);setCurUserRaw(nu);
      setToast({msg:"Welcome to CureLink, "+nu.name.split(" ")[0]+"!",type:"new"});
    }
    setScreen("userDash");
  };
  const handleDrLogin=info=>{
    const existing=docs.find(d=>d.id===info.regId);
    if(existing){setCurDrId(existing.id);setToast({msg:"Welcome back, "+existing.name+"! 👨‍⚕️",type:"ok"});setScreen("doctorDash");}
    else{setTempDr(info);setScreen("doctorSetup");}
  };
  const handleSetupComplete=fullDoc=>{
    const doc={...fullDoc,id:tempDr.regId};
    setDocs(ds=>[...ds,doc]);setCurDrId(doc.id);
    setToast({msg:"Welcome to CureLink, "+doc.name+"!",type:"new"});
    setScreen("doctorDash");
  };
  const logoutUser=()=>{setCurUserRaw(null);setScreen("landing");};
  const logoutDoctor=()=>{setCurDrId(null);setScreen("landing");};

  return(
    <div>
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      {screen==="landing"&&<Landing onChoice={c=>setScreen(c==="user"?"userLogin":"doctorLogin")}/>}
      {screen==="userLogin"&&<PatientLogin onBack={()=>setScreen("landing")} onLogin={handleUserLogin}/>}
      {screen==="doctorLogin"&&<DoctorLogin onBack={()=>setScreen("landing")} onLogin={handleDrLogin}/>}
      {screen==="doctorSetup"&&tempDr&&<DoctorSetup loginInfo={tempDr} onComplete={handleSetupComplete}/>}
      {screen==="userDash"&&curUser&&<PatientDash user={curUser} setUser={setUser} docs={docs} setDocs={setDocs} onLogout={logoutUser}/>}
      {screen==="doctorDash"&&curDoc&&<DoctorDash loginInfo={curDoc} docs={docs} setDocs={setDocs} onLogout={logoutDoctor}/>}
      {screen==="userDash"&&!curUser&&<Landing onChoice={c=>setScreen(c==="user"?"userLogin":"doctorLogin")}/>}
      {screen==="doctorDash"&&!curDoc&&<Landing onChoice={c=>setScreen(c==="user"?"userLogin":"doctorLogin")}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
